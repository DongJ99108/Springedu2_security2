<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 정보 수정</title>
    <link rel="stylesheet" href="/css/visitor.css" />
    <style>
        .box { width: 420px; margin: 40px auto; padding: 24px; border: 1px solid #ddd; border-radius: 12px; background: #fff; }
        label { display: block; margin: 12px 0; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 16px; margin-top: 10px; }
        .msg { color: #2563eb; }
        .error { color: #dc2626; }
        .hint { background: #f3f4f6; padding: 10px; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>
  <div class="box">
    <h2>회원 수정</h2>
    <p>아이디: <strong th:text="${member.username}"></strong></p>
    <form method="post" th:action="@{/admin/members/{id}/edit(id=${member.id})}" th:object="${memberForm}">
        <div class="error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
        <!-- th:if="${#fields.hasGlobalErrors()} 는 th:object="${memberForm}"가 없으면 작동하지 않음 -->

        <!-- *는 form 태그에서 th:object="${memberForm}와 연결해주는 역할을 가지고 있음 -->

        <label>이름
            <input type="text" th:field="*{name}" required>
            <span class="error" th:errors="*{name}"></span>
        </label>
        <br>
        <label>이메일
            <input type="email" th:field="*{email}" required>
            <span class="error" th:errors="*{email}"></span>
        </label>
        <br>
        <label>새 비밀번호
            <input type="password" th:field="*{password}" placeholder="수정 안할라면 좋은 말로 할 때 비워두십쇼">
            <span class="error" th:errors="*{password}"></span>
        </label>
        <br>
        <label>권한
            <select th:field="*{role}">
                <option value="USER">USER</option>
                <option value="ADMIN">ADMIN</option>
            </select>
        </label>
        <br>
        <label>
            <input th:type="checkbox" th:field="*{enabled}">사용 가능
        </label>

        <br>
        <button type="submit">수정</button>
        <a th:href="@{/admin/members}"><button type="button">몽녹으로</button></a>
    </form>
  </div>
</body>
</html>
