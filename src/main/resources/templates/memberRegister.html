<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" href="/css/visitor.css">
    <style>
      .box { width: 420px; margin: 40px auto; padding: 24px; border: 1px solid #ddd; border-radius: 12px; background: #fff; }
      label { display: block; margin: 12px 0; }
      input { width: 100%; padding: 10px; box-sizing: border-box; }
      button { padding: 10px 16px; margin-top: 10px; }
      .error { color: #dc2626; }
    </style>
</head>
<body>
  <div class="box">
    <h2>회원가입</h2>
    <form method="post" th:action="@{/members/register}" th:object="${memberForm}">
      <div class="error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
      <!-- th:if="${#fields.hasGlobalErrors()} 는 th:object="${memberForm}"가 없으면 작동하지 않음 -->

        <label>아이디
          <input type="text" th:field="*{username}" placeholder="4자 이상" required>
          <span class="error" th:errors="*{username}"></span>
        </label>
        <br>
        <!-- *는 form 태그에서 th:object="${memberForm}와 연결해주는 역할을 가지고 있음 -->
        <label>비밀번호
          <input type="password" th:field="*{password}" placeholder="4자 이상" required>
          <span class="error" th:errors="*{password}"></span>
        </label>
        <br>
        <label>이름
          <input type="text" th:field="*{name}" placeholder="최대 30자 까지" required>
          <span class="error" th:errors="*{name}"></span>
        </label>
        <br>
        <label>이메일
          <input type="email" th:field="*{email}" placeholder="최대 120자 까지" required>
          <span class="error" th:errors="*{email}"></span>
        </label>
        <br>

        <button type="submit">가입</button>
        <a th:href="@{/login}"><button type="button">로그인으로</button></a>
    </form>
  </div>
</body>
</html>
