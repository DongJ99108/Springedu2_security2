version: '3.8'

services:
  postgres-container:
    image: postgres:15-alpine
    container_name: postgres-container
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: edudb
      POSTGRES_USER: jdbctest
      POSTGRES_PASSWORD: jdbctest
      TZ: Asia/Seoul
    volumes:
      - springedu2-postgres-data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready 명령어를 사용해 데이터베이스가 준비되었는지 확인합니다.
      test: ["CMD-SHELL", "pg_isready -U jdbctest -d edudb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - springboot-postgres-net

  springedu2-container:
    image: greenhoon/hthspringedu2:1.0
    container_name: springedu2-container
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      # PostgreSQL용 JDBC URL 형식으로 변경되었습니다.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-container:5432/edudb?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: jdbctest
      SPRING_DATASOURCE_PASSWORD: jdbctest
    depends_on:
      postgres-container:
        condition: service_healthy
    networks:
      - springboot-postgres-net

volumes:
  springedu2-postgres-data:
    name: springedu2-postgres-data

networks:
  springboot-postgres-net:
    name: springboot-postgres-net
    driver: bridge